<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TutorLoop AI Lecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css?v=20260628f" />
  </head>
  <body class="lecture-page">
    <div class="lecture-shell">
      <header class="lecture-header">
        <div>
          <span class="eyebrow">AI Lecture Room</span>
          <h1 id="lectureTitle">Live tutoring session</h1>
          <p id="lectureSubtitle" class="lecture-subtitle"></p>
        </div>
        <div class="button-row">
          <span id="connectionStatus" class="pill">Connecting</span>
          <button id="endLectureBtn" class="secondary">End &amp; save</button>
          <a href="/" class="link-button">Exit</a>
        </div>
      </header>

      <div class="lecture-grid">
        <section class="lecture-stage panel">
          <div class="lecture-stage-inner">
            <div id="tutorAvatar" class="tutor-avatar" aria-label="Virtual AI tutor">
              <div class="avatar-face chalk-avatar-face" aria-hidden="true">
                <svg class="chalk-panda-svg compact" viewBox="0 0 260 220">
                  <g class="chalk-wiggle board-lines">
                    <path d="M44 50 H216" />
                    <path d="M56 168 H208" />
                    <path d="M58 78 C85 65 112 67 138 80" />
                    <path d="M160 75 C178 65 199 66 216 78" />
                  </g>
                  <g class="chalk-formula">
                    <text x="46" y="105">dy/dx</text>
                    <path d="M92 118 C121 99 151 99 178 118" />
                    <path d="M170 110 L181 118 L167 123" />
                  </g>
                  <g class="panda-bob">
                    <path class="chalk-fill dark" d="M66 68 C51 44 68 28 89 45 C95 34 112 27 132 29 C151 31 166 40 172 55 C194 43 211 58 197 82 C210 98 213 121 203 141 C190 169 157 180 121 176 C86 172 60 153 56 126 C53 104 56 84 66 68 Z" />
                    <path class="chalk-fill light" d="M74 83 C85 53 115 42 145 50 C175 58 194 83 190 114 C185 151 153 167 120 163 C88 159 65 138 66 108 C66 98 69 89 74 83 Z" />
                    <path class="chalk-fill dark eye-patch left" d="M82 91 C86 75 101 70 112 81 C121 91 117 110 103 115 C89 120 78 107 82 91 Z" />
                    <path class="chalk-fill dark eye-patch right" d="M148 84 C160 73 176 79 180 94 C185 110 172 121 158 115 C144 109 139 94 148 84 Z" />
                    <g class="panda-eyes">
                      <path d="M101 94 C103 92 106 93 107 96" />
                      <path d="M159 96 C162 93 165 94 166 98" />
                    </g>
                    <path class="panda-blink" d="M96 96 H108" />
                    <path class="panda-blink right" d="M157 98 H168" />
                    <path class="chalk-fill nose" d="M125 107 C130 103 137 105 139 110 C136 117 128 117 125 107 Z" />
                    <path class="panda-smile" d="M132 118 C128 126 119 126 115 119" />
                    <path class="panda-smile" d="M134 118 C140 126 149 124 151 116" />
                    <path class="chalk-limb arm-left" d="M75 130 C50 133 38 146 33 164" />
                    <path class="chalk-limb arm-right" d="M176 125 C199 116 215 101 224 80" />
                    <path class="chalk-pointer" d="M221 78 L236 54" />
                    <path class="chalk-limb" d="M100 165 C91 181 79 190 64 194" />
                    <path class="chalk-limb" d="M148 164 C160 181 173 190 190 193" />
                  </g>
                </svg>
              </div>
              <div id="tutorVisualizer" class="avatar-visualizer"></div>
              <p id="tutorStatus" class="avatar-status">Virtual tutor</p>
            </div>
            <video id="studentVideo" class="student-pip" autoplay playsinline muted></video>
            <div id="agentAudio" hidden></div>
          </div>
          <div class="lecture-controls">
            <button id="toggleMicBtn">Mic on</button>
            <button id="toggleCamBtn" class="secondary">Camera on</button>
            <button id="raiseHandBtn" class="secondary">Interject</button>
          </div>
          <p id="lectureHint" class="lecture-hint">
            Speak naturally to ask questions anytime. The AI tutor will pause and respond to your voice.
          </p>
        </section>

        <aside class="lecture-sidebar">
          <section class="panel notes-panel">
            <div class="panel-head">
              <div>
                <span class="label">Lesson notes</span>
                <h3>Visible during lecture</h3>
              </div>
            </div>
            <ol id="lectureOutline" class="lecture-outline"></ol>
            <div id="lectureNotes" class="notes-stack"></div>
          </section>

          <section class="panel transcript-panel">
            <div class="panel-head">
              <div>
                <span class="label">Live transcript</span>
                <h3>Session memory</h3>
              </div>
            </div>
            <div id="liveTranscript" class="transcript-feed"></div>
          </section>
        </aside>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
    <script src="/assets/ai-lecture.js?v=20260628f"></script>
  </body>
</html>
